site_name: NERV 시스템 백서
site_description: >-
  45개 에이전트 · 7 캐릭터 · MAGI 자율 교차검증 — 학술 연구를 지원하는
  멀티에이전트 시스템의 아키텍처·운영 백서
site_url: https://taehyeonglim.github.io/nerv-whitepaper/
repo_url: https://github.com/taehyeonglim/nerv-whitepaper
repo_name: taehyeonglim/nerv-whitepaper
copyright: © 2026 Taehyeong Lim · NERV Multi-Agent Research System

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/brightness-auto
        name: 라이트 모드로
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: red
      accent: red
      toggle:
        icon: material/brightness-7
        name: 다크 모드로
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: red
      toggle:
        icon: material/brightness-4
        name: 시스템 설정 따르기
  font:
    text: Noto Sans KR
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.superfences
  - toc:
      permalink: true

extra_css:
  - assets/nerv.css?v=9

extra_javascript:
  - assets/diagram-zoom.js?v=9

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/taehyeonglim/nerv-whitepaper

